<!DOCTYPE html>
<html>
<head>
    <title>Select Anime</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card">
        <h1>Did you mean...</h1>
        <ul> 
            {% for title in titles %}
            <li>
                <form action="/score" method="POST">
                    <input type="hidden" name="anime_title" value="{{ title.title }}">
                    <button type="submit">{{ title.title }}</button>
                </form>
            </li>
            {% endfor %}
        </ul>
        <br>
        <a href="/" style="color: #666; font-size: 0.9rem; text-decoration: none;">Cancel</a>
    </div>
</body>
</html>
