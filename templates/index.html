<!DOCTYPE html>
<html>
<head>
    <title>Animesco</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    
    <div class="card-wide" style="max-width: 900px; padding: 50px;">
        <h1 style="font-size: 2.8rem; margin-bottom: 10px;">Animesco</h1>
        <p style="font-size: 1.1rem; margin-bottom: 40px;">A simplified Anime search tool.</p>
        
        <div class="hub-container">
            
            <div class="hub-card">
                <h2>Search</h2>
                <p>Analyze aggregated scores, watch trailers, and discover similar shows instantly.</p>
                
                <form action="/search" method="POST" class="hub-form">
                    <input type="text" name="anime_title" placeholder="Enter an anime title..." required autocomplete="off">
                    <button type="submit" class="btn">Search Anime</button>
                </form>
            </div>

            <div class="hub-card">
                <h2>Recommend me something!</h2>
                <p>Input 2 or 3 of your favorite shows to generate a highly targeted, overlapping recommendation list.</p>
                
                <a href="/combiner" class="btn watch-btn" style="margin-top: auto; display: block;">Launch</a>
            </div>

        </div>
    </div>

</body>
</html>
