<!DOCTYPE html>
<html>
<head>
    <title>Anime Scorer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card">
        <img src="{{ mal_cover }}" alt="Anime Cover">
        <h1>{{ anime_title }}</h1>
        
        <div class="score-highlight">
            Average Score: {{ average_score }}
        </div>

        <div class="details">
            <p>MAL Score: {{ mal_score }}</p>
            <p>AniList Score: {{ anilist_score }}</p>
        </div>

        <a href="/" class="btn">Search Another</a>
    </div>
</body>
</html>
