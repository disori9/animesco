<!DOCTYPE html>
<html>
<head>
    <title>Anime Scorer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card">
        <img src="{{ mal_cover }}" alt="Anime Cover">
        <h1>{{ anime_title }}</h1>
        
        <div class="score-highlight">
            Average Score: {{ average_score }}
        </div>

        <div class="details">
            <div class="score-row">
                <div class="score-box">
                    <span class="score-label">MAL Score</span>
                    <span class="score-value">{{ mal_score }}</span>
                </div>

                <div class="score-box">
                    <span class="score-label">AniList Score</span>
                    <span class="score-value">{{ anilist_score }}</span>
                </div>
            </div>
            
            <div class="synopsis-container">
                <p><strong>Synopsis:</strong></p>
                <p id="synopsisText" class="synopsis-collapsed">
                    {{ synopsis }}
                </p>
                <button id="toggleBtn" class="read-more-btn" onclick="toggleSynopsis()">Read More</button>
            </div>
        </div>

        <a href="/" class="btn">Search Another</a>
    </div>

    <script>
        function toggleSynopsis() {
            var text = document.getElementById("synopsisText");
            var btn = document.getElementById("toggleBtn");

            // Check if it is currently collapsed
            if (text.classList.contains("synopsis-collapsed")) {
                // Expand it
                text.classList.remove("synopsis-collapsed");
                text.classList.add("synopsis-expanded");
                btn.innerText = "Read Less"; // Change button text
            } else {
                // Collapse it
                text.classList.remove("synopsis-expanded");
                text.classList.add("synopsis-collapsed");
                btn.innerText = "Read More"; // Reset button text
            }
        }
    </script>
</body>
</html>
